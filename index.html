<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videos PF - Buscador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <main class="app-shell">
        <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
        <header class="hero">
            <p class="eyebrow">Repositorio de clases</p>
            <h1>Videos de YouTube</h1>
            <p class="subhead">
                Buscador por fecha o titulo, filtros por año y cuatrimestre, y reproduccion
                directa desde esta pagina.
            </p>
        </header>

        <section class="controls" aria-label="Filtros">
            <div class="control-block search-block">
                <label for="searchInput">Buscar</label>
                <input id="searchInput" type="search" placeholder="Ej: induccion o 2024-10" autocomplete="off" />
                <div class="search-mode">
                    <label><input type="radio" name="searchMode" value="title" checked /> Titulo</label>
                    <label><input type="radio" name="searchMode" value="date" /> Fecha</label>
                </div>
            </div>

            <div class="control-block">
                <label for="yearFilter">Año</label>
                <select id="yearFilter">
                    <option value="all">Todos</option>
                </select>
            </div>

            <div class="control-block">
                <label for="cuatriFilter">Cuatrimestre</label>
                <select id="cuatriFilter">
                    <option value="all">Todos</option>
                    <option value="1">1er cuatri (mar-jun)</option>
                    <option value="2">2do cuatri (may-dic)</option>
                </select>
            </div>
        </section>

        <section class="content-grid">
            <article class="player-panel" aria-live="polite">
                <div class="player-frame-wrap" id="playerWrap">
                    <p class="player-placeholder">Selecciona un video para reproducirlo.</p>
                </div>
                <div class="player-meta" id="playerMeta"></div>
            </article>

            <article class="list-panel">
                <div class="list-header">
                    <h2>Resultados</h2>
                    <span id="resultsCount">0 videos</span>
                </div>
                <ul id="videoList" class="video-list"></ul>
            </article>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
